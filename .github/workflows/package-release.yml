name: Package and Release

on:
  push:
    tags:
      - "v*"
      - "[0-9]*"
  workflow_dispatch:
    inputs:
      platform:
        description: "打包平台"
        required: true
        default: "all"
        type: choice
        options:
          - x64
          - x86
          - all
      configuration:
        description: "构建配置"
        required: true
        default: "Release"
        type: choice
        options:
          - Release
          - Debug
      use_upx:
        description: "使用 UPX 压缩 exe"
        required: true
        default: true
        type: boolean
      publish_release:
        description: "创建或更新 GitHub Release"
        required: true
        default: true
        type: boolean
      version:
        description: "发布版本号，例如 1.2.3"
        required: true
        default: "0.1.0"
        type: string
      make_latest:
        description: "将本次发布设为 Latest"
        required: true
        default: true
        type: boolean
      move_existing_tag:
        description: "强制移动已存在的版本 tag（危险）"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  package:
    name: Package Quattro
    runs-on: windows-2022

    defaults:
      run:
        shell: pwsh

    env:
      VCPKG_ROOT: ${{ github.workspace }}\.vcpkg-root
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}\.vcpkg-cache

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set package options
        id: options
        run: |
          $isTagBuild = "${{ github.event_name }}" -eq "push"
          $platform = if ($isTagBuild) { "all" } else { "${{ inputs.platform }}" }
          $configuration = if ($isTagBuild) { "Release" } else { "${{ inputs.configuration }}" }
          $useUpx = if ($isTagBuild) { "true" } else { "${{ inputs.use_upx }}" }
          $publishRelease = if ($isTagBuild) { "true" } else { "${{ inputs.publish_release }}" }
          $makeLatest = if ($isTagBuild) { "true" } else { "${{ inputs.make_latest }}" }
          $moveExistingTag = if ($isTagBuild) { "false" } else { "${{ inputs.move_existing_tag }}" }
          if ($isTagBuild) {
            $releaseTag = "${{ github.ref_name }}".Trim()
            $version = $releaseTag
            if ($version.StartsWith("v", [System.StringComparison]::OrdinalIgnoreCase)) {
              $version = $version.Substring(1)
            }
          } else {
            $version = "${{ inputs.version }}".Trim()
            if ($version.StartsWith("v", [System.StringComparison]::OrdinalIgnoreCase)) {
              $version = $version.Substring(1)
            }
            $releaseTag = "v$version"
          }
          $useUpx = $useUpx.ToLowerInvariant()
          $publishRelease = $publishRelease.ToLowerInvariant()
          $makeLatest = $makeLatest.ToLowerInvariant()
          $moveExistingTag = $moveExistingTag.ToLowerInvariant()

          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "version is required."
          }
          if ($version -notmatch '^\d+\.\d+\.\d+(\.\d+)?$') {
            throw "version must be numeric semantic version, for example 1.2.3. Actual: $version"
          }
          if ($publishRelease -ne "true" -and $moveExistingTag -eq "true") {
            throw "move_existing_tag requires publish_release to be enabled."
          }

          "platform=$platform" >> $env:GITHUB_OUTPUT
          "configuration=$configuration" >> $env:GITHUB_OUTPUT
          "use_upx=$useUpx" >> $env:GITHUB_OUTPUT
          "publish_release=$publishRelease" >> $env:GITHUB_OUTPUT
          "make_latest=$makeLatest" >> $env:GITHUB_OUTPUT
          "move_existing_tag=$moveExistingTag" >> $env:GITHUB_OUTPUT
          "release_tag=$releaseTag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Cache vcpkg sources and packages
        uses: actions/cache@v4
        with:
          path: |
            .vcpkg-root
            .vcpkg-cache
            vcpkg_installed
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-

      - name: Prepare vcpkg binary cache
        run: |
          New-Item -ItemType Directory -Force -Path "$env:VCPKG_DEFAULT_BINARY_CACHE" | Out-Null

      - name: Bootstrap vcpkg
        run: |
          if (!(Test-Path "$env:VCPKG_ROOT\vcpkg.exe")) {
            if (Test-Path "$env:VCPKG_ROOT") {
              Remove-Item -LiteralPath "$env:VCPKG_ROOT" -Recurse -Force
            }
            git clone --depth 1 https://github.com/microsoft/vcpkg "$env:VCPKG_ROOT"
            & "$env:VCPKG_ROOT\bootstrap-vcpkg.bat" -disableMetrics
          }

      - name: Cache build directories
        uses: actions/cache@v4
        with:
          path: |
            build-vcpkg-x86
            build-vcpkg-x64
          key: build-${{ runner.os }}-${{ steps.options.outputs.configuration }}-${{ steps.options.outputs.platform }}-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json', 'vcpkg.json', 'src/**', 'resources/**', 'theme/**', 'icons/**', 'docs/**', 'plugins/**', 'tools/**') }}
          restore-keys: |
            build-${{ runner.os }}-${{ steps.options.outputs.configuration }}-

      - name: Package
        run: |
          $args = @(
            "-ExecutionPolicy", "Bypass",
            "-File", ".\tools\build.ps1",
            "-Configuration", "${{ steps.options.outputs.configuration }}",
            "-Backend", "vcpkg",
            "-NoZip",
            "-Version", "${{ steps.options.outputs.version }}",
            "-ReleaseTag", "${{ steps.options.outputs.release_tag }}"
          )

          if ("${{ steps.options.outputs.platform }}" -eq "all") {
            $args += "-All"
          } else {
            $args += @("-Platform", "${{ steps.options.outputs.platform }}")
          }
          if ("${{ steps.options.outputs.use_upx }}" -eq "true") {
            choco install upx -y --no-progress
            $upx = Get-Command upx -ErrorAction SilentlyContinue
            if ($upx) {
              $args += @("-Upx", "-UpxPath", $upx.Source)
            } else {
              Write-Warning "UPX was requested but is unavailable; continuing without compression."
            }
          }

          & powershell @args

      - name: Generate checksums
        run: |
          $files = @(Get-ChildItem -LiteralPath dist -Filter "Quattro-*.exe" -File | Sort-Object Name)
          $files += @(Get-ChildItem -LiteralPath dist -Filter "Quattro.exe" -File | Sort-Object Name)
          if ($files.Count -eq 0) {
            throw "No package executables were found under dist."
          }
          $lines = foreach ($file in $files) {
            $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $file.FullName).Hash.ToLowerInvariant()
            "$hash  $($file.Name)"
          }
          $lines | Set-Content -LiteralPath "dist\SHA256SUMS.txt" -Encoding ascii
          if (!(Test-Path -LiteralPath "dist\latest.json")) {
            throw "latest.json was not generated under dist."
          }

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: quattro-${{ steps.options.outputs.platform }}-${{ steps.options.outputs.configuration }}
          path: |
            dist/Quattro-*.exe
            dist/Quattro.exe
            dist/SHA256SUMS.txt
            dist/latest.json
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release
        if: steps.options.outputs.publish_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ steps.options.outputs.release_tag }}"
          $makeLatest = "${{ steps.options.outputs.make_latest }}" -eq "true"
          $moveExistingTag = "${{ steps.options.outputs.move_existing_tag }}" -eq "true"
          $files = @(Get-ChildItem -LiteralPath dist -Filter "Quattro-*.exe" -File | ForEach-Object { $_.FullName })
          $files += @(Get-ChildItem -LiteralPath dist -Filter "Quattro.exe" -File | ForEach-Object { $_.FullName })
          $files += @(Get-ChildItem -LiteralPath dist -Filter "SHA256SUMS.txt" -File | ForEach-Object { $_.FullName })
          $files += @(Get-ChildItem -LiteralPath dist -Filter "latest.json" -File | ForEach-Object { $_.FullName })
          if ($files.Count -eq 0) {
            throw "No release assets were found under dist."
          }

          $tagExists = $false
          git ls-remote --exit-code --tags origin $tag | Out-Null
          if ($LASTEXITCODE -eq 0) {
            $tagExists = $true
          }
          if ($tagExists -and $moveExistingTag) {
            git tag -f $tag "${{ github.sha }}"
            git push --force origin "refs/tags/$tag"
          } elseif (!$tagExists) {
            git tag $tag "${{ github.sha }}"
            git push origin "refs/tags/$tag"
          }

          $existing = gh release view $tag 2>$null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag @files --clobber
            if ($makeLatest) {
              gh release edit $tag --latest
            }
          } else {
            $createArgs = @("release", "create", $tag) + $files + @(
              "--title", $tag,
              "--generate-notes",
              "--target", "${{ github.sha }}"
            )
            if ($makeLatest) {
              $createArgs += "--latest"
            } else {
              $createArgs += "--latest=false"
            }
            gh @createArgs
          }
